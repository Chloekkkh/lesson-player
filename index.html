<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HSK 课程中心</title>
  <style>
    :root {
      --blue: #4a82ef;
      --blue-deep: #2b55c8;
      --blue-soft: #eaf2ff;
      --ink: #24324f;
      --body: #4d586f;
      --line: #d7deea;
      --bg: #f3f6fb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(circle at top left, rgba(74,130,239,0.09), transparent 22%),
        linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Aptos","Segoe UI","Microsoft YaHei UI","PingFang SC",sans-serif;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    /* HEADER */
    .header { text-align: center; margin-bottom: 56px; }
    .header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }
    .header p { font-size: 1.1rem; color: var(--body); }
    .header .badge {
      display: inline-block;
      background: var(--blue-soft);
      color: var(--blue-deep);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    /* GRID */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* CARD */
    .course-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 28px 24px;
      box-shadow: 0 4px 20px rgba(32,55,102,0.07);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(32,55,102,0.12);
    }
    .card-top { display: flex; align-items: flex-start; gap: 14px; }
    .card-icon {
      width: 48px; height: 48px;
      background: var(--blue-soft);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .card-id { font-size: 0.8rem; color: var(--blue); font-weight: 600; }
    .card-desc {
      font-size: 0.9rem;
      color: var(--body);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }
    .card-slides { font-size: 0.8rem; color: var(--body); }
    .card-slides span { font-weight: 700; color: var(--ink); }
    .card-arrow { color: var(--blue); font-size: 1.2rem; }

    /* TOOLS SECTION */
    .tools-section { margin-top: 56px; }
    .tools-section h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .tools-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .tool-badge {
      padding: 8px 18px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 50px;
      font-size: 0.85rem;
      color: var(--body);
      font-family: "Consolas","Monaco",monospace;
    }

    /* LOADING */
    .loading { text-align: center; padding: 60px; color: var(--body); }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--line);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR */
    .error-msg { text-align: center; padding: 40px; color: #e05555; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">HSK 中文课程</div>
      <h1>课程中心</h1>
      <p>选择一门课程开始学习</p>
    </div>

    <div id="app">
      <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>加载课程列表...</p>
      </div>
      <div class="error-msg" id="error" style="display:none"></div>
      <div class="courses-grid" id="grid"></div>
    </div>

    <div class="tools-section">
      <h2>维护工具（Node.js）</h2>
      <div class="tools-grid">
        <span class="tool-badge">node tools/new-course.js &lt;id&gt; --title "标题"</span>
        <span class="tool-badge">node tools/add-slide.js &lt;id&gt; --type exercise --exerciseType choice --index N</span>
        <span class="tool-badge">node tools/serve.js</span>
      </div>
    </div>
  </div>

<script>
(function() {
  const grid   = document.getElementById('grid');
  const loading = document.getElementById('loading');
  const errorEl = document.getElementById('error');

  const COURSE_ORDER = [
    'lesson-thanks',
    // 新课程请按顺序添加到这里（自动排序显示）
  ];

  const ICONS = ['📖','💬','🏠','🍜','🚌','🛒','👨‍⚕️','🏥','📅','🎉','✈️','🎓','👔','💰','🎯'];

  async function getCourses() {
    const res = await fetch('/api/courses');
    if (!res.ok) return [];
    const courses = await res.json();
    return courses.map(c => c.id);
  }

  async function loadCourse(id) {
    try {
      const res = await fetch(`courses/${id}/course.json`);
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  }

  async function init() {
    try {
      const ids = await getCourses();
      if (!ids.length) {
        loading.style.display = 'none';
        grid.innerHTML = '<p style="color:var(--body);text-align:center;grid-column:1/-1;padding:40px">暂无课程，运行 <code>node tools/new-course.js</code> 创建第一个课程</p>';
        return;
      }

      // Load all course.json files
      const courses = (await Promise.all(ids.map(id => loadCourse(id)))).filter(Boolean);

      // Sort by COURSE_ORDER, then alphabetically
      courses.sort((a, b) => {
        const ai = COURSE_ORDER.indexOf(a.id);
        const bi = COURSE_ORDER.indexOf(b.id);
        if (ai !== -1 && bi !== -1) return ai - bi;
        if (ai !== -1) return -1;
        if (bi !== -1) return 1;
        return a.id.localeCompare(b.id);
      });

      loading.style.display = 'none';

      if (!courses.length) {
        grid.innerHTML = '<p style="color:var(--body);text-align:center;grid-column:1/-1;padding:40px">课程目录为空</p>';
        return;
      }

      courses.forEach((course, i) => {
        const card = document.createElement('a');
        card.className = 'course-card';
        card.href = `player.html?course=${encodeURIComponent(course.id)}`;

        const icon = ICONS[i % ICONS.length];
        const slideCount = course.slides ? course.slides.length : 0;
        const author = course.author ? ` · ${course.author}` : '';

        card.innerHTML = `
          <div class="card-top">
            <div class="card-icon">${icon}</div>
            <div class="card-meta">
              <div class="card-title">${course.title || course.id}</div>
              <div class="card-id">${course.id}</div>
            </div>
          </div>
          <div class="card-desc">${course.description || '暂无描述'}</div>
          <div class="card-footer">
            <div class="card-slides"><span>${slideCount}</span> 页${author}</div>
            <div class="card-arrow">→</div>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch (err) {
      loading.style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.textContent = '加载失败: ' + err.message;
    }
  }

  init();
})();
</script>
</body>
</html>
